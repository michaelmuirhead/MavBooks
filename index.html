<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1a1a2e" />
<title>MavBooks - Your Reading Library</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>" />
<style>
  :root {
    --bg: #0f0f17;
    --bg-elev: #1a1a2e;
    --bg-card: #20203a;
    --bg-input: #181828;
    --border: #2a2a44;
    --text: #f1f1f5;
    --text-dim: #9999b0;
    --text-faint: #6b6b85;
    --accent: #7c5cff;
    --accent-hover: #8e74ff;
    --success: #4ade80;
    --warning: #fbbf24;
    --danger: #ef4444;
    --shadow: 0 8px 24px rgba(0,0,0,0.4);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  button, input, textarea, select {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
    background: none;
    border: none;
    outline: none;
  }
  button { cursor: pointer; }

  /* App shell */
  #app {
    max-width: 900px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 80px;
    position: relative;
  }

  header.app-header {
    padding: 18px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: linear-gradient(to bottom, var(--bg) 80%, transparent);
    z-index: 50;
    backdrop-filter: blur(12px);
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon { font-size: 26px; }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--bg-elev); border-color: var(--accent); }
  .icon-btn svg { width: 20px; height: 20px; stroke: var(--text); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 0 20px 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  .tab .count {
    background: rgba(255,255,255,0.15);
    padding: 1px 7px;
    border-radius: 999px;
    margin-left: 6px;
    font-size: 12px;
  }
  .tab:not(.active) .count { background: var(--bg-elev); color: var(--text-faint); }

  /* Main views */
  main { padding: 0 20px; }
  .view { display: none; }
  .view.active { display: block; animation: fadeIn 0.2s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* Book grid */
  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
    padding: 6px 0 20px;
  }
  .book-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    border: 1px solid var(--border);
  }
  .book-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--accent); }
  .book-cover {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: linear-gradient(135deg, #2a2a44 0%, #1a1a2e 100%);
  }
  .book-cover-fallback {
    width: 100%;
    aspect-ratio: 2/3;
    background: linear-gradient(135deg, #4a3a8a 0%, #2a2a44 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    padding: 12px;
    font-size: 13px;
    font-weight: 600;
  }
  .book-info {
    padding: 10px 12px 12px;
  }
  .book-title {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .book-author {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .status-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.5);
  }
  .status-badge.to-read { color: #c4b5fd; }
  .status-badge.reading { color: #fbbf24; }
  .status-badge.read { color: #4ade80; }
  .progress-mini {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(0,0,0,0.5);
  }
  .progress-mini-fill {
    height: 100%;
    background: var(--warning);
    transition: width 0.3s;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }
  .empty-state h2 { font-size: 22px; margin-bottom: 10px; color: var(--text); }
  .empty-state p { font-size: 15px; max-width: 360px; margin: 0 auto 24px; }
  .empty-state .icon { font-size: 56px; margin-bottom: 16px; opacity: 0.7; }

  /* Floating action button */
  .fab {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: white;
    border-radius: 999px;
    padding: 14px 24px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(124, 92, 255, 0.4);
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 40;
    transition: all 0.15s;
  }
  .fab:hover { background: var(--accent-hover); transform: translateX(-50%) translateY(-2px); }
  .fab svg { width: 20px; height: 20px; stroke: white; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.15s;
  }
  @media (min-width: 600px) {
    .modal-overlay { align-items: center; }
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg-elev);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 520px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 0;
    animation: slideUp 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    border: 1px solid var(--border);
  }
  @media (min-width: 600px) {
    .modal { border-radius: 20px; max-height: 88vh; }
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-header {
    padding: 18px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg-elev);
    z-index: 5;
  }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg-card);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 20px;
  }
  .modal-body { padding: 20px; }

  /* Add book picker */
  .add-options { display: grid; gap: 10px; }
  .add-option {
    padding: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    text-align: left;
    transition: all 0.15s;
  }
  .add-option:hover { border-color: var(--accent); background: var(--bg-input); }
  .add-option .opt-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .add-option .opt-text strong { display: block; font-size: 15px; margin-bottom: 2px; }
  .add-option .opt-text span { font-size: 13px; color: var(--text-dim); }

  /* Scanner */
  #scanner-container {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: black;
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
  }
  #scanner-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .scanner-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scanner-frame {
    width: 70%;
    height: 35%;
    border: 2px solid var(--accent);
    border-radius: 12px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
  }
  .scanner-status {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
  }

  /* Search */
  .search-input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    margin-bottom: 14px;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-results { display: grid; gap: 10px; }
  .search-result {
    display: flex;
    gap: 12px;
    padding: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    text-align: left;
    width: 100%;
    transition: all 0.15s;
  }
  .search-result:hover { border-color: var(--accent); }
  .search-result img, .search-result .sr-cover {
    width: 50px;
    height: 75px;
    object-fit: cover;
    border-radius: 4px;
    background: var(--bg-elev);
    flex-shrink: 0;
  }
  .search-result .sr-cover {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--text-faint);
  }
  .search-result .sr-info { flex: 1; min-width: 0; }
  .search-result .sr-title { font-weight: 600; font-size: 14px; line-height: 1.3; }
  .search-result .sr-meta { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  /* Book detail */
  .book-detail-header {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }
  .book-detail-cover {
    width: 110px;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
    box-shadow: var(--shadow);
    background: var(--bg-card);
  }
  .book-detail-info { flex: 1; min-width: 0; }
  .book-detail-title { font-size: 18px; font-weight: 700; line-height: 1.25; }
  .book-detail-author { font-size: 14px; color: var(--text-dim); margin-top: 4px; }
  .book-detail-meta { font-size: 12px; color: var(--text-faint); margin-top: 8px; }

  .field-group { margin-bottom: 18px; }
  .field-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .status-pills { display: flex; gap: 6px; }
  .status-pill {
    flex: 1;
    padding: 10px 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    color: var(--text-dim);
    transition: all 0.15s;
  }
  .status-pill.active.to-read { background: rgba(196, 181, 253, 0.2); border-color: #c4b5fd; color: #c4b5fd; }
  .status-pill.active.reading { background: rgba(251, 191, 36, 0.2); border-color: var(--warning); color: var(--warning); }
  .status-pill.active.read { background: rgba(74, 222, 128, 0.2); border-color: var(--success); color: var(--success); }

  .stars { display: flex; gap: 4px; }
  .star {
    font-size: 28px;
    color: var(--text-faint);
    transition: color 0.15s, transform 0.1s;
    user-select: none;
    line-height: 1;
  }
  .star:hover { transform: scale(1.15); }
  .star.filled { color: var(--warning); }

  .progress-input-row { display: flex; gap: 8px; align-items: center; }
  .progress-input-row input {
    width: 70px;
    padding: 8px 10px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    text-align: center;
  }
  .progress-input-row span { color: var(--text-dim); font-size: 14px; }
  .progress-bar {
    flex: 1;
    height: 8px;
    background: var(--bg-card);
    border-radius: 999px;
    overflow: hidden;
    margin-left: 8px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }

  textarea.notes {
    width: 100%;
    min-height: 90px;
    padding: 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    resize: vertical;
    font-size: 14px;
    line-height: 1.5;
  }
  textarea.notes:focus { border-color: var(--accent); }

  .btn {
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); }
  .btn-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
  .btn-danger:hover { background: rgba(239, 68, 68, 0.25); }
  .btn-block { width: 100%; }

  .actions-row { display: flex; gap: 8px; margin-top: 20px; }

  /* Stats view */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .stat-value { font-size: 28px; font-weight: 800; line-height: 1.1; }
  .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-emoji { font-size: 22px; margin-bottom: 6px; }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    margin: 24px 0 12px;
  }
  .activity-list { display: grid; gap: 10px; }
  .activity-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .activity-row img, .activity-row .ar-cover {
    width: 36px;
    height: 54px;
    object-fit: cover;
    border-radius: 4px;
    flex-shrink: 0;
    background: var(--bg-elev);
  }
  .activity-row .ar-cover { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-faint); }
  .activity-row .ar-info { flex: 1; min-width: 0; }
  .activity-row .ar-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .activity-row .ar-meta { font-size: 11px; color: var(--text-dim); }

  /* Settings */
  .settings-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }
  .settings-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .settings-desc { font-size: 13px; color: var(--text-dim); margin-bottom: 14px; }
  .setting-input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: ui-monospace, SFMono-Regular, monospace;
    margin-bottom: 8px;
  }
  .setting-input:focus { border-color: var(--accent); }
  .sync-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    background: var(--bg-input);
  }
  .sync-status.synced { background: rgba(74, 222, 128, 0.15); color: var(--success); }
  .sync-status.local { background: rgba(251, 191, 36, 0.15); color: var(--warning); }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-elev);
    color: var(--text);
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    z-index: 200;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  /* Loading spinner */
  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-row { display: flex; align-items: center; justify-content: center; padding: 30px; color: var(--text-dim); }

  details summary {
    cursor: pointer;
    font-size: 13px;
    color: var(--accent);
    margin-top: 6px;
  }
  details[open] summary { margin-bottom: 8px; }
  pre.code {
    background: var(--bg-input);
    padding: 12px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    line-height: 1.5;
    overflow-x: auto;
    border: 1px solid var(--border);
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-word;
  }
</style>
</head>
<body>

<div id="app">
  <header class="app-header">
    <div class="logo"><span class="logo-icon">📚</span> MavBooks</div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-stats" title="Stats">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      </button>
      <button class="icon-btn" id="btn-settings" title="Settings">

<div class="toast" id="toast"></div>

<script type="module">
  // ========== STORAGE LAYER ==========
  // Local first; cloud sync (Firebase) activates when configured.
  const LS_KEY = 'mavbooks_library_v1';
  const LS_FB_CONFIG = 'mavbooks_fb_config_v1';

  let cloudReady = false;
  let cloudUser = null;
  let firebaseRefs = null; // { auth, db, doc, getDoc, setDoc, signIn, signOut, onAuth }

  async function initFirebaseIfConfigured() {
    const raw = localStorage.getItem(LS_FB_CONFIG);
    if (!raw) return false;
    let cfg;
    try { cfg = JSON.parse(raw); } catch { return false; }
    if (!cfg.apiKey || !cfg.projectId) return false;
    try {
      const [{ initializeApp }, authMod, fsMod] = await Promise.all([
        import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js'),
        import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js'),
        import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'),
      ]);
      const app = initializeApp(cfg);
      const auth = authMod.getAuth(app);
      const db = fsMod.getFirestore(app);
      firebaseRefs = {
        app, auth, db,
        signIn: () => authMod.signInWithPopup(auth, new authMod.GoogleAuthProvider()),
        signOut: () => authMod.signOut(auth),
        onAuth: cb => authMod.onAuthStateChanged(auth, cb),
        doc: fsMod.doc, getDoc: fsMod.getDoc, setDoc: fsMod.setDoc,
      };
      cloudReady = true;
      firebaseRefs.onAuth(async (u) => {
        cloudUser = u;
        if (u) await pullFromCloud();
        renderSettingsView();
        renderHeaderBadge();
      });
      return true;
    } catch (e) {
      console.error('Firebase init failed', e);
      return false;
    }
  }

  async function pullFromCloud() {
    if (!cloudReady || !cloudUser) return;
    try {
      const ref = firebaseRefs.doc(firebaseRefs.db, 'libraries', cloudUser.uid);
      const snap = await firebaseRefs.getDoc(ref);
      if (snap.exists()) {
        const data = snap.data();
        if (data.books && Array.isArray(data.books)) {
          state.books = data.books;
          saveLocal();
          renderAll();
          toast('Library synced from cloud');
        }
      } else {
        // First time: push current local library up
        await pushToCloud();
      }
    } catch (e) { console.error('Pull failed', e); }
  }

  async function pushToCloud() {
    if (!cloudReady || !cloudUser) return;
    try {
      const ref = firebaseRefs.doc(firebaseRefs.db, 'libraries', cloudUser.uid);
      await firebaseRefs.setDoc(ref, { books: state.books, updatedAt: Date.now() });
    } catch (e) { console.error('Push failed', e); }
  }

  function loadLocal() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }
  function saveLocal() {
    localStorage.setItem(LS_KEY, JSON.stringify(state.books));
  }

  // ========== STATE ==========
  const state = {
    books: loadLocal(),
    filter: 'all',
    activeView: 'library',
  };

  // ========== BOOK API (Open Library) ==========
  async function lookupByISBN(isbn) {
    isbn = isbn.replace(/[^0-9X]/gi, '');
    try {
      const r = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&jscmd=data&format=json`);
      const j = await r.json();
      const key = `ISBN:${isbn}`;
      if (j[key]) {
        const b = j[key];
        return {
          isbn,
          title: b.title || 'Untitled',
          author: (b.authors || []).map(a => a.name).join(', ') || 'Unknown',
          pages: b.number_of_pages || 0,
          cover: b.cover ? (b.cover.large || b.cover.medium || b.cover.small) : `https://covers.openlibrary.org/b/isbn/${isbn}-L.jpg`,
        };
      }
    } catch (e) { console.error(e); }
    // Fallback: try search.json with ISBN
    try {
      const r = await fetch(`https://openlibrary.org/search.json?isbn=${isbn}`);
      const j = await r.json();
      if (j.docs && j.docs.length) {
        const d = j.docs[0];
        return {
          isbn,
          title: d.title || 'Untitled',
          author: (d.author_name || []).join(', ') || 'Unknown',
          pages: d.number_of_pages_median || 0,
          cover: d.cover_i ? `https://covers.openlibrary.org/b/id/${d.cover_i}-L.jpg` : `https://covers.openlibrary.org/b/isbn/${isbn}-L.jpg`,
        };
      }
    } catch (e) { console.error(e); }
    return { isbn, title: `ISBN ${isbn}`, author: 'Unknown', pages: 0, cover: '' };
  }

  async function searchBooks(q) {
    if (!q || q.length < 2) return [];
    const r = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=20`);
    const j = await r.json();
    return (j.docs || []).map(d => ({
      isbn: (d.isbn && d.isbn[0]) || `ol_${d.key}`,
      title: d.title || 'Untitled',
      author: (d.author_name || []).join(', ') || 'Unknown',
      pages: d.number_of_pages_median || 0,
      year: d.first_publish_year,
      cover: d.cover_i ? `https://covers.openlibrary.org/b/id/${d.cover_i}-M.jpg` : '',
    }));
  }

  // ========== BOOK CRUD ==========
  function addBook(meta) {
    const id = meta.isbn || `m_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    if (state.books.find(b => b.id === id)) {
      toast('Already in your library');
      return state.books.find(b => b.id === id);
    }
    const book = {
      id,
      isbn: meta.isbn || '',
      title: meta.title,
      author: meta.author || 'Unknown',
      cover: meta.cover || '',
      pages: meta.pages || 0,
      status: 'to-read',
      rating: 0,
      notes: '',
      currentPage: 0,
      dateAdded: Date.now(),
      dateStarted: null,
      dateFinished: null,
    };
    state.books.unshift(book);
    persist();
    toast(`Added "${book.title}"`);
    return book;
  }

  function updateBook(id, patch) {
    const b = state.books.find(b => b.id === id);
    if (!b) return;
    // Auto-stamp dates on status changes
    if (patch.status && patch.status !== b.status) {
      if (patch.status === 'reading' && !b.dateStarted) patch.dateStarted = Date.now();
      if (patch.status === 'read' && !b.dateFinished) patch.dateFinished = Date.now();
      if (patch.status === 'to-read') { patch.dateStarted = null; patch.dateFinished = null; }
    }
    Object.assign(b, patch);
    // If progress hits 100%, mark as read
    if (patch.currentPage != null && b.pages > 0 && patch.currentPage >= b.pages && b.status !== 'read') {
      b.status = 'read';
      if (!b.dateFinished) b.dateFinished = Date.now();
    }
    persist();
  }

  function deleteBook(id) {
    state.books = state.books.filter(b => b.id !== id);
    persist();
  }

  function persist() {
    saveLocal();
    if (cloudReady && cloudUser) pushToCloud();
    renderAll();
  }

  // ========== UI HELPERS ==========
  const $ = (s, root = document) => root.querySelector(s);
  const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));

  function toast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._tm);
    toast._tm = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function openModal(id) {
    $('#' + id).classList.add('active');
  }
  function closeModal(id) {
    $('#' + id).classList.remove('active');
  }
  function closeAllModals() {
    $$('.modal-overlay').forEach(m => m.classList.remove('active'));
  }

  // ========== RENDER ==========
  function bookCardHtml(b) {
    const titleShort = escapeHtml((b.title || '').slice(0, 40));
    const cover = b.cover
      ? `<img class="book-cover" src="${escapeHtml(b.cover)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
         <div class="book-cover-fallback" style="display:none;">${titleShort}</div>`
      : `<div class="book-cover-fallback">${titleShort}</div>`;
    const statusLabel = { 'to-read': 'To Read', 'reading': 'Reading', 'read': 'Read' }[b.status];
    let progressBar = '';
    if (b.status === 'reading' && b.pages > 0 && b.currentPage > 0) {
      const pct = Math.min(100, Math.round((b.currentPage / b.pages) * 100));
      progressBar = `<div class="progress-mini"><div class="progress-mini-fill" style="width:${pct}%"></div></div>`;
    }
    return `
      <div class="book-card" data-id="${b.id}">
        ${cover}
        <span class="status-badge ${b.status}">${statusLabel}</span>
        ${progressBar}
        <div class="book-info">
          <div class="book-title">${escapeHtml(b.title)}</div>
          <div class="book-author">${escapeHtml(b.author)}</div>
        </div>
      </div>
    `;
  }

  function renderLibrary() {
    const grid = $('#book-grid');
    const empty = $('#empty-state');
    const filtered = state.filter === 'all'
      ? state.books
      : state.books.filter(b => b.status === state.filter);

    if (state.books.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
    } else if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">📭</div><p>No books in this shelf yet.</p></div>`;
      empty.style.display = 'none';
    } else {
      grid.innerHTML = filtered.map(bookCardHtml).join('');
      empty.style.display = 'none';
    }

    // Counts
    $('#count-all').textContent = state.books.length;
    $('#count-reading').textContent = state.books.filter(b => b.status === 'reading').length;
    $('#count-to-read').textContent = state.books.filter(b => b.status === 'to-read').length;
    $('#count-read').textContent = state.books.filter(b => b.status === 'read').length;
  }

  function renderStatsView() {
    if (state.activeView !== 'stats') return;
    const v = $('#view-stats');
    const totalBooks = state.books.length;
    const finished = state.books.filter(b => b.status === 'read');
    const reading = state.books.filter(b => b.status === 'reading');
    const totalPages = finished.reduce((s, b) => s + (b.pages || 0), 0);
    const ratedBooks = state.books.filter(b => b.rating > 0);
    const avgRating = ratedBooks.length
      ? (ratedBooks.reduce((s, b) => s + b.rating, 0) / ratedBooks.length).toFixed(1)
      : '—';

    // Books finished this year
    const yearStart = new Date(new Date().getFullYear(), 0, 1).getTime();
    const finishedThisYear = finished.filter(b => b.dateFinished && b.dateFinished >= yearStart).length;

    // Current streak: count distinct days in the last 30 with progress updates
    // (Simple proxy: days since dateStarted on currently reading, or finished books within window)
    const recentlyFinished = finished
      .filter(b => b.dateFinished)
      .sort((a, b) => b.dateFinished - a.dateFinished)
      .slice(0, 5);

    v.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-emoji">📚</div><div class="stat-value">${totalBooks}</div><div class="stat-label">Total books</div></div>
        <div class="stat-card"><div class="stat-emoji">✅</div><div class="stat-value">${finished.length}</div><div class="stat-label">Finished</div></div>
        <div class="stat-card"><div class="stat-emoji">📖</div><div class="stat-value">${reading.length}</div><div class="stat-label">Currently reading</div></div>
        <div class="stat-card"><div class="stat-emoji">📄</div><div class="stat-value">${totalPages.toLocaleString()}</div><div class="stat-label">Pages read</div></div>
        <div class="stat-card"><div class="stat-emoji">⭐</div><div class="stat-value">${avgRating}</div><div class="stat-label">Avg rating</div></div>
        <div class="stat-card"><div class="stat-emoji">🗓️</div><div class="stat-value">${finishedThisYear}</div><div class="stat-label">This year</div></div>
      </div>

      ${reading.length ? `
        <div class="section-title">Currently reading</div>
        <div class="activity-list">
          ${reading.map(b => {
            const pct = b.pages > 0 ? Math.min(100, Math.round((b.currentPage / b.pages) * 100)) : 0;
            return `
              <div class="activity-row" data-id="${b.id}">
                ${b.cover ? `<img src="${escapeHtml(b.cover)}" alt="" />` : `<div class="ar-cover">📕</div>`}
                <div class="ar-info">
                  <div class="ar-title">${escapeHtml(b.title)}</div>
                  <div class="ar-meta">${b.currentPage || 0} / ${b.pages || '?'} pages · ${pct}%</div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      ` : ''}

      ${recentlyFinished.length ? `
        <div class="section-title">Recently finished</div>
        <div class="activity-list">
          ${recentlyFinished.map(b => `
            <div class="activity-row" data-id="${b.id}">
              ${b.cover ? `<img src="${escapeHtml(b.cover)}" alt="" />` : `<div class="ar-cover">📗</div>`}
              <div class="ar-info">
                <div class="ar-title">${escapeHtml(b.title)}</div>
                <div class="ar-meta">${'★'.repeat(b.rating)}${'☆'.repeat(5 - b.rating)} · ${new Date(b.dateFinished).toLocaleDateString()}</div>
              </div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      ${totalBooks === 0 ? `<div class="empty-state"><div class="icon">📊</div><h2>No stats yet</h2><p>Add your first book to start tracking your reading.</p></div>` : ''}
    `;

    // Click to open detail
    $$('.activity-row').forEach(r => r.addEventListener('click', () => openDetail(r.dataset.id)));
  }

  function renderSettingsView() {
    if (state.activeView !== 'settings') return;
    const v = $('#view-settings');
    const cfgRaw = localStorage.getItem(LS_FB_CONFIG) || '';
    const isCloud = cloudReady;
    const isSignedIn = !!cloudUser;

    v.innerHTML = `
      <div class="settings-section">
        <div class="settings-title">☁️ Cloud Sync ${
          isSignedIn
            ? '<span class="sync-status synced"><span class="sync-dot"></span>Synced</span>'
            : isCloud
              ? '<span class="sync-status local"><span class="sync-dot"></span>Configured · Sign in</span>'
              : '<span class="sync-status local"><span class="sync-dot"></span>Local only</span>'
        }</div>
        <div class="settings-desc">
          ${isSignedIn
            ? `Signed in as <strong>${escapeHtml(cloudUser.email || cloudUser.displayName || cloudUser.uid)}</strong>. Your library syncs automatically across devices.`
            : isCloud
              ? 'Firebase is configured. Sign in with Google to sync.'
              : 'Your library is saved in this browser only. Set up Firebase below for free cross-device cloud sync.'
          }
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          ${isCloud
            ? (isSignedIn
              ? '<button class="btn btn-secondary" id="btn-signout">Sign out</button>'
              : '<button class="btn btn-primary" id="btn-signin">Sign in with Google</button>')
            : ''
          }
          <button class="btn btn-secondary" id="btn-toggle-fb">${cfgRaw ? 'Edit Firebase config' : 'Set up Firebase'}</button>
        </div>

        <div id="fb-config-area" style="display:none; margin-top:14px;">
          <div class="settings-desc" style="margin-bottom:8px;">
            Paste your Firebase web app config object (the one that starts with <code>{ apiKey: "..." }</code>). Keys: apiKey, authDomain, projectId, appId.
          </div>
          <textarea class="setting-input" id="fb-config-input" rows="6" placeholder='{"apiKey":"...", "authDomain":"...", "projectId":"...", "appId":"..."}' style="resize:vertical;">${escapeHtml(cfgRaw)}</textarea>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-primary" id="fb-save">Save & connect</button>
            ${cfgRaw ? '<button class="btn btn-danger" id="fb-clear">Disconnect</button>' : ''}
          </div>
          <details>
            <summary>How do I get a Firebase config? (free, ~5 min)</summary>
            <ol style="font-size:13px; line-height:1.7; padding-left:20px; color:var(--text-dim); margin-top:8px;">
              <li>Go to <a href="https://console.firebase.google.com" target="_blank" style="color:var(--accent);">console.firebase.google.com</a> and create a new project (free).</li>
              <li>In the project, click <strong>Build → Authentication → Get started → Sign-in method → Google → Enable</strong>.</li>
              <li>Click <strong>Build → Firestore Database → Create database</strong> (start in production mode, choose any region).</li>
              <li>Go to Firestore <strong>Rules</strong> tab and paste:<pre class="code">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /libraries/{userId} {
      allow read, write: if request.auth != null
        &amp;&amp; request.auth.uid == userId;
    }
  }
}</pre> Click Publish.</li>
              <li>Click the <strong>⚙️ gear → Project settings</strong>. Scroll to "Your apps", click the <strong>&lt;/&gt;</strong> web icon, register an app (any nickname).</li>
              <li>Copy the <code>firebaseConfig</code> object and paste it above. Click Save & connect.</li>
              <li>Back here, click <strong>Sign in with Google</strong>. Done!</li>
            </ol>
          </details>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-title">📤 Export / Import</div>
        <div class="settings-desc">Download your library as JSON or import from a backup.</div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-secondary" id="btn-export">Download JSON</button>
          <button class="btn btn-secondary" id="btn-import">Import JSON</button>
          <input type="file" id="import-file" accept="application/json" style="display:none;" />
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-title">⚠️ Danger zone</div>
        <div class="settings-desc">Permanently delete every book in your library. This cannot be undone.</div>
        <button class="btn btn-danger" id="btn-clear-all">Clear all books</button>
      </div>

      <div class="settings-section" style="text-align:center; color:var(--text-faint); font-size:12px;">
        MavBooks · Book data from <a href="https://openlibrary.org" target="_blank" style="color:var(--accent);">Open Library</a>
      </div>
    `;

    $('#btn-toggle-fb')?.addEventListener('click', () => {
      const area = $('#fb-config-area');
      area.style.display = area.style.display === 'none' ? 'block' : 'none';
    });
    $('#fb-save')?.addEventListener('click', async () => {
      const raw = $('#fb-config-input').value.trim();
      if (!raw) return toast('Paste your config first');
      let parsed;
      try {
        // Accept either JSON or a JS object literal
        parsed = JSON.parse(raw.replace(/^\s*const\s+\w+\s*=\s*/, '').replace(/;?\s*$/, ''));
      } catch {
        try {
          // eslint-disable-next-line no-new-func
          parsed = (new Function('return ' + raw.replace(/^\s*const\s+\w+\s*=\s*/, '').replace(/;\s*$/, '')))();
        } catch {
          return toast('Could not parse config — make sure it\'s valid');
        }
      }
      if (!parsed.apiKey || !parsed.projectId) return toast('Missing apiKey or projectId');
      localStorage.setItem(LS_FB_CONFIG, JSON.stringify(parsed));
      toast('Config saved — connecting...');
      const ok = await initFirebaseIfConfigured();
      if (ok) { toast('Connected! Now sign in.'); renderSettingsView(); }
      else toast('Connection failed — check console');
    });
    $('#fb-clear')?.addEventListener('click', () => {
      if (!confirm('Disconnect cloud sync? Your local library stays.')) return;
      localStorage.removeItem(LS_FB_CONFIG);
      cloudReady = false; cloudUser = null; firebaseRefs = null;
      toast('Disconnected. Reload to fully reset.');
      renderSettingsView();
      renderHeaderBadge();
    });
    $('#btn-signin')?.addEventListener('click', async () => {
      try { await firebaseRefs.signIn(); }
      catch (e) { console.error(e); toast('Sign-in failed'); }
    });
    $('#btn-signout')?.addEventListener('click', async () => {
      try { await firebaseRefs.signOut(); cloudUser = null; renderSettingsView(); }
      catch (e) { console.error(e); }
    });
    $('#btn-export')?.addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(state.books, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `mavbooks-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });
    $('#btn-import')?.addEventListener('click', () => $('#import-file').click());
    $('#import-file')?.addEventListener('change', async e => {
      const f = e.target.files[0];
      if (!f) return;
      try {
        const text = await f.text();
        const arr = JSON.parse(text);
        if (!Array.isArray(arr)) throw new Error('Not an array');
        if (!confirm(`Import ${arr.length} books? Existing books with the same ID will be replaced.`)) return;
        const map = new Map(state.books.map(b => [b.id, b]));
        arr.forEach(b => { if (b.id && b.title) map.set(b.id, b); });
        state.books = Array.from(map.values()).sort((a,b) => (b.dateAdded||0) - (a.dateAdded||0));
        persist();
        toast(`Imported ${arr.length} books`);
      } catch (e) {
        toast('Invalid JSON file');
      }
    });
    $('#btn-clear-all')?.addEventListener('click', () => {
      if (!confirm('Delete ALL books? This cannot be undone.')) return;
      state.books = [];
      persist();
      toast('Library cleared');
    });
  }

  function renderHeaderBadge() {
    // (kept simple — sync status is shown on Settings tab)
  }

  function renderAll() {
    renderLibrary();
    renderStatsView();
    renderSettingsView();
  }

  // ========== VIEW SWITCHING ==========
  function showView(view) {
    state.activeView = view;
    $$('.view').forEach(v => v.classList.remove('active'));
    $('#view-' + view).classList.add('active');
    $('#tabs').style.display = view === 'library' ? '' : 'none';
    $('#btn-add').style.display = view === 'library' ? '' : 'none';
    if (view === 'stats') renderStatsView();
    if (view === 'settings') renderSettingsView();
  }

  // ========== BOOK DETAIL ==========
  function openDetail(id) {
    const b = state.books.find(x => x.id === id);
    if (!b) return;
    const body = $('#detail-body');
    body.innerHTML = `
      <div class="book-detail-header">
        ${b.cover
          ? `<img class="book-detail-cover" src="${escapeHtml(b.cover)}" alt="" onerror="this.style.display='none'" />`
          : `<div class="book-detail-cover" style="display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--text-faint);">📕</div>`}
        <div class="book-detail-info">
          <div class="book-detail-title">${escapeHtml(b.title)}</div>
          <div class="book-detail-author">${escapeHtml(b.author)}</div>
          <div class="book-detail-meta">
            ${b.pages ? `${b.pages} pages` : 'No page count'}
            ${b.isbn ? ` · ISBN ${escapeHtml(b.isbn)}` : ''}
          </div>
        </div>
      </div>

      <div class="field-group">
        <div class="field-label">Status</div>
        <div class="status-pills" id="status-pills">
          <button class="status-pill to-read ${b.status==='to-read'?'active':''}" data-status="to-read">📚 To Read</button>
          <button class="status-pill reading ${b.status==='reading'?'active':''}" data-status="reading">📖 Reading</button>
          <button class="status-pill read ${b.status==='read'?'active':''}" data-status="read">✅ Read</button>
        </div>
      </div>

      <div class="field-group">
        <div class="field-label">Rating</div>
        <div class="stars" id="stars">
          ${[1,2,3,4,5].map(n => `<span class="star ${b.rating >= n ? 'filled' : ''}" data-rating="${n}">★</span>`).join('')}
          ${b.rating > 0 ? `<button class="btn btn-secondary" style="margin-left:auto; padding:4px 10px; font-size:12px;" id="rating-clear">Clear</button>` : ''}
        </div>
      </div>

      <div class="field-group">
        <div class="field-label">Reading progress</div>
        <div class="progress-input-row">
          <input type="number" id="progress-current" value="${b.currentPage || 0}" min="0" max="${b.pages || 99999}" />
          <span>of</span>
          <input type="number" id="progress-total" value="${b.pages || 0}" min="0" />
          <span>pages</span>
        </div>
        <div class="progress-bar" style="margin-top:10px;">
          <div class="progress-bar-fill" id="progress-fill" style="width:${b.pages > 0 ? Math.min(100, (b.currentPage / b.pages) * 100) : 0}%"></div>
        </div>
      </div>

      <div class="field-group">
        <div class="field-label">Notes</div>
        <textarea class="notes" id="book-notes" placeholder="What did you think? Quotes, thoughts...">${escapeHtml(b.notes || '')}</textarea>
      </div>

      ${b.dateStarted || b.dateFinished ? `
        <div class="field-group">
          <div class="field-label">Timeline</div>
          <div style="font-size:13px; color:var(--text-dim); line-height:1.7;">
            ${b.dateStarted ? `Started: ${new Date(b.dateStarted).toLocaleDateString()}<br>` : ''}
            ${b.dateFinished ? `Finished: ${new Date(b.dateFinished).toLocaleDateString()}` : ''}
          </div>
        </div>
      ` : ''}

      <div class="actions-row">
        <button class="btn btn-danger" id="detail-delete">Delete</button>
        <button class="btn btn-primary" id="detail-save" style="margin-left:auto;">Save</button>
      </div>
    `;

    openModal('modal-detail');

    // Status pills
    $$('#status-pills .status-pill').forEach(p => p.addEventListener('click', () => {
      $$('#status-pills .status-pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      p.dataset.changed = 'true';
    }));

    // Stars
    $$('#stars .star').forEach(s => s.addEventListener('click', () => {
      const v = parseInt(s.dataset.rating);
      $$('#stars .star').forEach(x => {
        const r = parseInt(x.dataset.rating);
        x.classList.toggle('filled', r <= v);
      });
      $('#stars').dataset.rating = v;
    }));
    $('#rating-clear')?.addEventListener('click', () => {
      $$('#stars .star').forEach(x => x.classList.remove('filled'));
      $('#stars').dataset.rating = 0;
    });

    // Live progress bar
    function updateProgressBar() {
      const cur = parseInt($('#progress-current').value) || 0;
      const tot = parseInt($('#progress-total').value) || 0;
      const pct = tot > 0 ? Math.min(100, (cur / tot) * 100) : 0;
      $('#progress-fill').style.width = pct + '%';
    }
    $('#progress-current').addEventListener('input', updateProgressBar);
    $('#progress-total').addEventListener('input', updateProgressBar);

    // Save
    $('#detail-save').addEventListener('click', () => {
      const activePill = $('#status-pills .status-pill.active');
      const newStatus = activePill ? activePill.dataset.status : b.status;
      const newRating = parseInt($('#stars').dataset.rating ?? b.rating) || 0;
      const cur = parseInt($('#progress-current').value) || 0;
      const tot = parseInt($('#progress-total').value) || 0;
      const notes = $('#book-notes').value;

      updateBook(b.id, {
        status: newStatus,
        rating: newRating,
        currentPage: cur,
        pages: tot,
        notes,
      });
      closeModal('modal-detail');
    });

    // Delete
    $('#detail-delete').addEventListener('click', () => {
      if (!confirm(`Delete "${b.title}" from your library?`)) return;
      deleteBook(b.id);
      closeModal('modal-detail');
      toast('Deleted');
    });
  }

  // ========== SCANNER ==========
  let scannerControls = null;
  let zxingReader = null;

  async function startScanner() {
    openModal('modal-scan');
    const status = $('#scanner-status');
    status.textContent = 'Loading scanner...';
    try {
      const { BrowserMultiFormatReader } = await import('https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/+esm');
      const { BarcodeFormat, DecodeHintType } = await import('https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/+esm');
      const hints = new Map();
      hints.set(DecodeHintType.POSSIBLE_FORMATS, [
        BarcodeFormat.EAN_13, BarcodeFormat.EAN_8, BarcodeFormat.UPC_A, BarcodeFormat.UPC_E
      ]);
      zxingReader = new BrowserMultiFormatReader(hints);
      const video = $('#scanner-video');
      status.textContent = 'Point camera at the barcode';

      // Prefer back camera
      const devices = await BrowserMultiFormatReader.listVideoInputDevices();
      const back = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[devices.length - 1];
      const deviceId = back ? back.deviceId : undefined;

      scannerControls = await zxingReader.decodeFromVideoDevice(deviceId, video, async (result, err) => {
        if (result) {
          const code = result.getText();
          // Validate ISBN-ish (10 or 13 digits, possibly EAN-13 starting with 978/979)
          if (/^(978|979)\d{10}$/.test(code) || /^\d{10}$/.test(code) || /^\d{13}$/.test(code)) {
            stopScanner();
            closeModal('modal-scan');
            toast('Looking up book...');
            const book = await lookupByISBN(code);
            addBook(book);
            const added = state.books.find(b => b.isbn === book.isbn);
            if (added) openDetail(added.id);
          }
        }
      });
    } catch (e) {
      console.error('Scanner error', e);
      status.textContent = 'Camera unavailable — please grant permission and use HTTPS';
    }
  }

  function stopScanner() {
    try { scannerControls && scannerControls.stop(); } catch {}
    try { zxingReader && zxingReader.reset(); } catch {}
    scannerControls = null;
    zxingReader = null;
  }

  // ========== SEARCH ==========
  let searchTimer = null;
  function setupSearch() {
    const input = $('#search-input');
    const results = $('#search-results');
    input.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const q = input.value.trim();
      if (q.length < 2) { results.innerHTML = ''; return; }
      results.innerHTML = `<div class="loading-row"><div class="spinner"></div></div>`;
      searchTimer = setTimeout(async () => {
        try {
          const items = await searchBooks(q);
          if (items.length === 0) {
            results.innerHTML = `<div class="empty-state" style="padding:30px;"><p>No results for "${escapeHtml(q)}"</p></div>`;
            return;
          }
          results.innerHTML = items.map((b, i) => `
            <button class="search-result" data-i="${i}">
              ${b.cover
                ? `<img src="${escapeHtml(b.cover)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" /><div class="sr-cover" style="display:none;">📕</div>`
                : `<div class="sr-cover">📕</div>`}
              <div class="sr-info">
                <div class="sr-title">${escapeHtml(b.title)}</div>
                <div class="sr-meta">${escapeHtml(b.author)}${b.year ? ' · ' + b.year : ''}${b.pages ? ' · ' + b.pages + ' pages' : ''}</div>
              </div>
            </button>
          `).join('');
          $$('#search-results .search-result').forEach(el => el.addEventListener('click', () => {
            const i = parseInt(el.dataset.i);
            const book = addBook(items[i]);
            closeModal('modal-search');
            input.value = '';
            results.innerHTML = '';
            if (book) openDetail(book.id);
          }));
        } catch (e) {
          console.error(e);
          results.innerHTML = `<div class="empty-state" style="padding:30px;"><p>Search failed. Check your connection.</p></div>`;
        }
      }, 350);
    });
  }

  // ========== EVENT WIRING ==========
  function setupEvents() {
    // Header buttons
    $('#btn-stats').addEventListener('click', () => showView(state.activeView === 'stats' ? 'library' : 'stats'));
    $('#btn-settings').addEventListener('click', () => showView(state.activeView === 'settings' ? 'library' : 'settings'));

    // Tabs (filter)
    $$('#tabs .tab').forEach(t => t.addEventListener('click', () => {
      $$('#tabs .tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      state.filter = t.dataset.filter;
      renderLibrary();
    }));

    // FAB add
    $('#btn-add').addEventListener('click', () => openModal('modal-add'));

    // Add options
    $('#opt-scan').addEventListener('click', () => {
      closeModal('modal-add');
      startScanner();
    });
    $('#opt-search').addEventListener('click', () => {
      closeModal('modal-add');
      openModal('modal-search');
      setTimeout(() => $('#search-input').focus(), 100);
    });
    $('#opt-manual').addEventListener('click', () => {
      closeModal('modal-add');
      openModal('modal-manual');
      setTimeout(() => $('#manual-title').focus(), 100);
    });

    // Manual add
    $('#manual-save').addEventListener('click', () => {
      const title = $('#manual-title').value.trim();
      if (!title) return toast('Title is required');
      const author = $('#manual-author').value.trim();
      const pages = parseInt($('#manual-pages').value) || 0;
      const book = addBook({ title, author, pages });
      $('#manual-title').value = '';
      $('#manual-author').value = '';
      $('#manual-pages').value = '';
      closeModal('modal-manual');
      if (book) openDetail(book.id);
    });

    // Scanner cancel
    $('#scan-cancel').addEventListener('click', () => {
      stopScanner();
      closeModal('modal-scan');
    });

    // Modal close on overlay click or [data-close]
    $$('.modal-overlay').forEach(o => {
      o.addEventListener('click', e => {
        if (e.target === o || e.target.hasAttribute('data-close')) {
          if (o.id === 'modal-scan') stopScanner();
          o.classList.remove('active');
        }
      });
    });

    // Esc closes modal
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { stopScanner(); closeAllModals(); }
    });

    // Click on a book card → open detail
    $('#book-grid').addEventListener('click', e => {
      const card = e.target.closest('.book-card');
      if (card) openDetail(card.dataset.id);
    });

    setupSearch();
  }

  // ========== BOOT ==========
  setupEvents();
  renderAll();
  initFirebaseIfConfigured().then(() => { renderSettingsView(); });
</script>
</body>
</html>
